<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XP計算ツール</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <div class="container">
        <h1>Flying Blue XP計算ツール</h1>
        <div class="card">
            <div class="row">
                <div class="form-group">
                    <label for="origin">出発地（3レター）</label>
                    <input type="text" id="origin" placeholder="例：HND" maxlength="3" />
                </div>
                <div class="form-group">
                    <label for="destination">目的地（3レター）</label>
                    <input type="text" id="destination" placeholder="例：CDG" maxlength="3" />
                </div>
            </div>
            <div class="form-group">
                <label for="classType">座席クラス</label>
                <select id="classType">
                    <option value="Economy">エコノミー</option>
                    <option value="PremiumEconomy">プレミアムエコノミー</option>
                    <option value="Business">ビジネス</option>
                    <option value="First">ファースト</option>
                </select>
            </div>
            <div class="form-group">
                <label for="price">片道あたりのチケット金額（円）</label>
                <input type="number" id="price" placeholder="例：150000" min="0" />
            </div>
            <button onclick="calc()">計算する</button>
            <div id="result"></div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
